<svg width="1200" height="720" viewBox="0 0 1200 720" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="720" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FAFC"/>
      <stop offset="1" stop-color="#EEF2FF"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#2563EB"/>
      <stop offset="1" stop-color="#0EA5E9"/>
    </linearGradient>
    <linearGradient id="accentWarm" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#F97316"/>
      <stop offset="1" stop-color="#FB7185"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#0F172A" flood-opacity="0.08"/>
    </filter>
    <style>
      .title { font: 700 34px Inter, Segoe UI, Arial, sans-serif; fill: #0F172A; }
      .subtitle { font: 500 18px Inter, Segoe UI, Arial, sans-serif; fill: #475569; }
      .cardTitle { font: 700 24px Inter, Segoe UI, Arial, sans-serif; fill: #0F172A; }
      .cardText { font: 500 16px Inter, Segoe UI, Arial, sans-serif; fill: #334155; }
      .pill { font: 700 13px Inter, Segoe UI, Arial, sans-serif; letter-spacing: 0.08em; text-transform: uppercase; }
      .small { font: 600 14px Inter, Segoe UI, Arial, sans-serif; fill: #64748B; }
      .mono { font: 600 15px 'JetBrains Mono', Consolas, monospace; fill: #0F172A; }
    </style>
  </defs>

  <rect width="1200" height="720" rx="28" fill="url(#bg)"/>
  <circle cx="110" cy="94" r="62" fill="#DBEAFE"/>
  <circle cx="1090" cy="620" r="90" fill="#FDE68A" fill-opacity="0.35"/>
  <circle cx="1020" cy="120" r="44" fill="#BFDBFE" fill-opacity="0.55"/>

  <text x="80" y="92" class="pill" fill="#2563EB">MeshForm Vue</text>
  <text x="80" y="138" class="title">Where MeshForm Vue fits</text>
  <text x="80" y="170" class="subtitle">Keep JSON Forms for rendering. Use MeshFlow to orchestrate dependency propagation.</text>

  <g filter="url(#shadow)">
    <rect x="72" y="230" width="300" height="360" rx="28" fill="white"/>
    <rect x="450" y="190" width="300" height="430" rx="28" fill="white"/>
    <rect x="828" y="230" width="300" height="360" rx="28" fill="white"/>
  </g>

  <rect x="96" y="258" width="128" height="34" rx="17" fill="#E0F2FE"/>
  <text x="118" y="280" class="pill" fill="#0369A1">Input Layer</text>
  <text x="96" y="330" class="cardTitle">JSON Forms stack</text>
  <text x="96" y="370" class="cardText">JSON Schema</text>
  <text x="96" y="408" class="cardText">UISchema</text>
  <text x="96" y="446" class="cardText">Custom renderers</text>
  <text x="96" y="484" class="cardText">Vue component tree</text>
  <rect x="96" y="518" width="252" height="44" rx="14" fill="#F8FAFC" stroke="#E2E8F0"/>
  <text x="120" y="546" class="mono">Render the form</text>

  <rect x="474" y="218" width="156" height="34" rx="17" fill="#FFEDD5"/>
  <text x="495" y="240" class="pill" fill="#C2410C">Orchestration</text>
  <text x="474" y="290" class="cardTitle">MeshForm Vue + MeshFlow</text>
  <text x="474" y="332" class="cardText">Explicit dependencies via</text>
  <text x="474" y="356" class="mono">from()</text>
  <text x="474" y="398" class="cardText">Engine-managed propagation</text>
  <text x="474" y="440" class="cardText">Deterministic execution order</text>
  <text x="474" y="482" class="cardText">Async-safe updates</text>
  <text x="474" y="524" class="cardText">Convergence for cyclic constraints</text>
  <rect x="474" y="556" width="252" height="44" rx="14" fill="#FFF7ED" stroke="#FDBA74"/>
  <text x="500" y="584" class="mono">Schedule, propagate, stabilize</text>

  <rect x="852" y="258" width="146" height="34" rx="17" fill="#DCFCE7"/>
  <text x="878" y="280" class="pill" fill="#15803D">Outcome</text>
  <text x="852" y="330" class="cardTitle">Stable form behavior</text>
  <text x="852" y="370" class="cardText">Predictable derived values</text>
  <text x="852" y="408" class="cardText">Fresh async options</text>
  <text x="852" y="446" class="cardText">Testable business rules</text>
  <text x="852" y="484" class="cardText">Readable linkage logic</text>
  <rect x="852" y="518" width="252" height="44" rx="14" fill="#F0FDF4" stroke="#86EFAC"/>
  <text x="876" y="546" class="mono">Render stable state</text>

  <path d="M372 410C402 410 414 410 450 410" stroke="url(#accent)" stroke-width="8" stroke-linecap="round"/>
  <path d="M750 410C786 410 798 410 828 410" stroke="url(#accentWarm)" stroke-width="8" stroke-linecap="round"/>
  <circle cx="410" cy="410" r="10" fill="#2563EB"/>
  <circle cx="790" cy="410" r="10" fill="#F97316"/>

  <rect x="430" y="96" width="340" height="58" rx="18" fill="#FFFFFF" stroke="#DBEAFE"/>
  <text x="462" y="131" class="small">Drop-in enhancement layer for complex forms in Vue 3</text>

  <text x="80" y="660" class="small">MeshForm Vue gives JSON Forms a deterministic state engine.</text>
</svg>