<svg width="1200" height="760" viewBox="0 0 1200 760" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="760" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FAFC"/>
      <stop offset="1" stop-color="#F9FAFB"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="22" flood-color="#0F172A" flood-opacity="0.10"/>
    </filter>
    <style>
      .title { font: 700 34px Inter, Segoe UI, Arial, sans-serif; fill: #0F172A; }
      .subtitle { font: 500 18px Inter, Segoe UI, Arial, sans-serif; fill: #475569; }
      .stepTitle { font: 700 20px Inter, Segoe UI, Arial, sans-serif; fill: #0F172A; }
      .stepText { font: 500 14px Inter, Segoe UI, Arial, sans-serif; fill: #475569; }
      .fieldLabel { font: 700 14px Inter, Segoe UI, Arial, sans-serif; fill: #334155; }
      .fieldValue { font: 600 18px Inter, Segoe UI, Arial, sans-serif; fill: #0F172A; }
      .small { font: 600 13px Inter, Segoe UI, Arial, sans-serif; fill: #64748B; }
      .pill { font: 700 13px Inter, Segoe UI, Arial, sans-serif; }
    </style>
  </defs>

  <rect width="1200" height="760" rx="28" fill="url(#bg)"/>
  <text x="70" y="90" class="title">One complex demo, broken into a readable chain</text>
  <text x="70" y="124" class="subtitle">This is the kind of linkage MeshForm Vue is meant to carry without collapsing into UI glue code.</text>

  <g filter="url(#shadow)">
    <rect x="70" y="180" width="220" height="420" rx="26" fill="white"/>
    <rect x="340" y="180" width="220" height="420" rx="26" fill="white"/>
    <rect x="610" y="180" width="220" height="420" rx="26" fill="white"/>
    <rect x="880" y="180" width="250" height="420" rx="26" fill="white"/>
  </g>

  <rect x="96" y="208" width="68" height="28" rx="14" fill="#DBEAFE"/>
  <text x="120" y="227" class="pill" fill="#1D4ED8">Step 1</text>
  <text x="96" y="272" class="stepTitle">Choose category</text>
  <text x="96" y="300" class="stepText">The user selects the upstream business dimension.</text>
  <rect x="96" y="338" width="168" height="82" rx="18" fill="#F8FAFC" stroke="#E2E8F0"/>
  <text x="116" y="368" class="fieldLabel">Category</text>
  <text x="116" y="400" class="fieldValue">Cloud Services</text>
  <text x="96" y="470" class="small">This is a common starting point in pricing, configuration, and eligibility flows.</text>

  <rect x="366" y="208" width="68" height="28" rx="14" fill="#DBEAFE"/>
  <text x="390" y="227" class="pill" fill="#1D4ED8">Step 2</text>
  <text x="366" y="272" class="stepTitle">Refresh options</text>
  <text x="366" y="300" class="stepText">Downstream choices update from the selected category.</text>
  <rect x="366" y="338" width="168" height="120" rx="18" fill="#EFF6FF" stroke="#93C5FD"/>
  <text x="386" y="368" class="fieldLabel">Product</text>
  <text x="386" y="402" class="fieldValue">4C8G Compute</text>
  <text x="386" y="430" class="small">Options now include:</text>
  <text x="386" y="452" class="small">2C4G, 4C8G, 8C16G</text>
  <text x="366" y="500" class="small">If the old value is no longer valid, MeshForm Vue can reset it safely.</text>

  <rect x="636" y="208" width="68" height="28" rx="14" fill="#FFEDD5"/>
  <text x="660" y="227" class="pill" fill="#C2410C">Step 3</text>
  <text x="636" y="272" class="stepTitle">Fill derived fields</text>
  <text x="636" y="300" class="stepText">A product selection can drive readonly fields and remote lookups.</text>
  <rect x="636" y="338" width="168" height="82" rx="18" fill="#FFF7ED" stroke="#FDBA74"/>
  <text x="656" y="368" class="fieldLabel">Unit Price</text>
  <text x="656" y="400" class="fieldValue">$299 / month</text>
  <rect x="636" y="438" width="168" height="82" rx="18" fill="#FFF7ED" stroke="#FDBA74"/>
  <text x="656" y="468" class="fieldLabel">Billing Cycle</text>
  <text x="656" y="500" class="fieldValue">Annual</text>
  <text x="636" y="550" class="small">This is where async fetches usually start causing stale-state bugs.</text>

  <rect x="906" y="208" width="68" height="28" rx="14" fill="#DCFCE7"/>
  <text x="930" y="227" class="pill" fill="#15803D">Step 4</text>
  <text x="906" y="272" class="stepTitle">Settle the result</text>
  <text x="906" y="300" class="stepText">The rest of the form updates from stable propagated state.</text>
  <rect x="906" y="338" width="198" height="82" rx="18" fill="#F0FDF4" stroke="#86EFAC"/>
  <text x="926" y="368" class="fieldLabel">Quantity</text>
  <text x="926" y="400" class="fieldValue">12</text>
  <rect x="906" y="438" width="198" height="82" rx="18" fill="#F0FDF4" stroke="#86EFAC"/>
  <text x="926" y="468" class="fieldLabel">Billing Total</text>
  <text x="926" y="500" class="fieldValue">$3,588</text>
  <text x="906" y="550" class="small">You read the rule chain from left to right and let the engine handle the propagation.</text>

  <path d="M290 390C312 390 320 390 340 390" stroke="#2563EB" stroke-width="7" stroke-linecap="round"/>
  <path d="M560 390C582 390 590 390 610 390" stroke="#F97316" stroke-width="7" stroke-linecap="round"/>
  <path d="M830 390C852 390 860 390 880 390" stroke="#16A34A" stroke-width="7" stroke-linecap="round"/>

  <text x="70" y="670" class="small">The demo is easier to explain because the dependency chain is explicit: category -> product -> derived billing fields -> total.</text>
</svg>