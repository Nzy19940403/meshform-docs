<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Arch Crop</title>
  <style>
    :root { color-scheme: light; }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: linear-gradient(180deg, #f8fafc 0%, #eef2ff 100%);
      padding: 24px;
      font-family: Inter, system-ui, sans-serif;
      opacity: 0;
      transition: opacity .2s ease;
    }
    body[data-ready='1'] { opacity: 1; }
    #frame-wrap {
      position: relative;
      overflow: hidden;
      border-radius: 20px;
      background: white;
      box-shadow: 0 20px 60px rgba(15, 23, 42, 0.12);
    }
    iframe {
      position: absolute;
      inset: 0 auto auto 0;
      border: 0;
      transform-origin: top left;
      background: white;
    }
  </style>
</head>
<body>
  <div id="frame-wrap">
    <iframe id="frame" src="http://127.0.0.1:4173/guide/architecture.html" title="Architecture"></iframe>
  </div>
  <script>
    const frame = document.getElementById('frame')
    const wrap = document.getElementById('frame-wrap')

    function isReady(doc) {
      const target = doc?.querySelector('.arch-wrap')
      const flow = doc?.querySelector('.vue-flow')
      const nodes = [...(doc?.querySelectorAll('.vue-flow__node') || [])]
      if (!target || !flow || nodes.length < 4) return false
      const rect = target.getBoundingClientRect()
      if (rect.width < 400 || rect.height < 300) return false
      const visibleNodes = nodes.filter((n) => {
        const r = n.getBoundingClientRect()
        return r.width > 100 && r.height > 40
      })
      return visibleNodes.length >= 4
    }

    function settle() {
      const doc = frame.contentDocument
      const root = doc?.documentElement
      const target = doc?.querySelector('.arch-wrap')
      if (!doc || !root || !target || !isReady(doc)) {
        setTimeout(settle, 300)
        return
      }

      const rect = target.getBoundingClientRect()
      const pad = 24
      wrap.style.width = `${Math.ceil(rect.width + pad * 2)}px`
      wrap.style.height = `${Math.ceil(rect.height + pad * 2)}px`

      frame.style.width = `${Math.max(root.scrollWidth, 1440)}px`
      frame.style.height = `${Math.max(root.scrollHeight, 2200)}px`
      frame.style.transform = `translate(${-rect.left + pad}px, ${-rect.top + pad}px)`

      document.body.dataset.ready = '1'
    }

    frame.addEventListener('load', () => {
      setTimeout(settle, 1800)
    })
  </script>
</body>
</html>
